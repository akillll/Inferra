services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      PROJECT_NAME: ${PROJECT_NAME:-Inferra}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://inferra:inferra@postgres:5432/inferra}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-inferra}
      POSTGRES_USER: ${POSTGRES_USER:-inferra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inferra}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
