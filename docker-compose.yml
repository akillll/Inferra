services:
  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: inferra-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - inferra

  backend:
    build:
      context: ./backend
    container_name: inferra-backend
    command: ["sh", "scripts/start.sh"]
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      PROJECT_NAME: ${PROJECT_NAME:-Inferra}
      API_VERSION: ${API_VERSION:-0.1.0}
      DEBUG: ${DEBUG:-false}
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://inferra:inferra@postgres:5432/inferra}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      RUN_RELOAD: ${RUN_RELOAD:-true}
      STARTUP_MAX_ATTEMPTS: ${STARTUP_MAX_ATTEMPTS:-60}
      STARTUP_WAIT_SECONDS: ${STARTUP_WAIT_SECONDS:-1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - inferra

  worker:
    build:
      context: ./backend
    container_name: inferra-worker
    command: ["sh", "scripts/start_worker.sh"]
    environment:
      PROJECT_NAME: ${PROJECT_NAME:-Inferra}
      API_VERSION: ${API_VERSION:-0.1.0}
      DEBUG: ${DEBUG:-false}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://inferra:inferra@postgres:5432/inferra}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      STARTUP_MAX_ATTEMPTS: ${STARTUP_MAX_ATTEMPTS:-60}
      STARTUP_WAIT_SECONDS: ${STARTUP_WAIT_SECONDS:-1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - inferra

  postgres:
    image: postgres:16-alpine
    container_name: inferra-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-inferra}
      POSTGRES_USER: ${POSTGRES_USER:-inferra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inferra}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - inferra

  redis:
    image: redis:7-alpine
    container_name: inferra-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - inferra

networks:
  inferra:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
